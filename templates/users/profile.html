{% extends 'base.html' %}

{% block content %}

<div class="max-w-3xl mx-auto mt-10 bg-gray-900 p-6 rounded-xl">

    <div class="flex items-center gap-6">

        {% if profile.avatar %}
            <img src="{{ profile.avatar.url }}" class="w-24 h-24 rounded-full object-cover">
        {% else %}
            <div class="w-24 h-24 rounded-full bg-gray-700"></div>
        {% endif %}

        <div>
            <h2 class="text-2xl font-bold">{{ profile.user.username }}</h2>
            <p class="text-gray-400">{{ profile.bio }}</p>
        </div>

    </div>

    <a href="/profile/edit/" class="inline-block mt-6 bg-blue-500 px-4 py-2 rounded">
        Редактировать
    </a>

</div>

{% endblock %}
