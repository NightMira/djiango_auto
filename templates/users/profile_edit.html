{% extends 'base.html' %}

{% block content %}

<div class="max-w-xl mx-auto mt-10 bg-gray-900 p-6 rounded-xl">

    <h2 class="text-xl mb-4">Редактирование профиля</h2>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        {{ form.as_p }}

        <button class="bg-green-500 px-4 py-2 rounded w-full mt-4">
            Сохранить
        </button>
    </form>

</div>

{% endblock %}
